server:
  port: 8888

spring:
  application:
    name: config-server
  cloud:
    config:
      server:
        git:
          uri: https://github.com/A-007481D/mediahub-config-repo.git
          default-label: main
          search-paths: '{application}'
          username: ${GIT_USER}
          password: ${GIT_TOKEN}
          clone-on-start: true
        native:
          search-locations: file:///config/
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:git}
encrypt:
  key: ${ENCRYPT_KEY}

eureka:
  client:
    service-url:
      default-zone: ${EUREKA_URL:http://localhost:8761/eureka/}


management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always